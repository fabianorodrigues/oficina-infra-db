name: Terraform Check and Plan

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: check

    env:
      AWS_REGION: ${{ secrets['AWS_REGION'] }}
      TF_STATE_BUCKET: ${{ secrets['TF_STATE_BUCKET'] }}
      TF_VAR_db_username: ${{ secrets['TF_VAR_db_username'] }}
      TF_VAR_db_password: ${{ secrets['TF_VAR_db_password'] }}
      TF_VAR_operator_cidr: ${{ secrets['TF_VAR_operator_cidr'] }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets['AWS_ACCESS_KEY_ID'] }}
          aws-secret-access-key: ${{ secrets['AWS_SECRET_ACCESS_KEY'] }}
          aws-session-token: ${{ secrets['AWS_SESSION_TOKEN'] }}
          aws-region: ${{ secrets['AWS_REGION'] }}

      - name: Ensure Terraform state bucket
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "TF_STATE_BUCKET secret is required."
            exit 1
          fi

          if [ -z "${AWS_REGION}" ]; then
            echo "AWS_REGION secret is required."
            exit 1
          fi

          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket already exists: ${TF_STATE_BUCKET}"
          else
            echo "Creating Terraform state bucket: ${TF_STATE_BUCKET}"

            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Terraform init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}"

      - name: Terraform plan
        run: terraform plan
