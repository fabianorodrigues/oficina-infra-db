name: Terraform Apply

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-db-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: terraform

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets['AWS_ACCESS_KEY_ID'] }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets['AWS_SECRET_ACCESS_KEY'] }}
      AWS_SESSION_TOKEN: ${{ secrets['AWS_SESSION_TOKEN'] }}
      AWS_REGION: ${{ secrets['AWS_REGION'] }}
      TF_STATE_BUCKET: ${{ secrets['TF_STATE_BUCKET'] }}
      ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'oficina' }}
      TF_VAR_db_username: ${{ secrets['TF_VAR_db_username'] }}
      TF_VAR_db_password: ${{ secrets['TF_VAR_db_password'] }}
      TF_VAR_enable_operator_db_access: ${{ vars.ENABLE_OPERATOR_DB_ACCESS || 'false' }}
      OPERATOR_CIDR: ${{ secrets['TF_VAR_operator_cidr'] }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_REGION
            TF_STATE_BUCKET
            TF_VAR_db_username
            TF_VAR_db_password
          )

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "${var_name} secret is required."
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          if [ "${TF_VAR_enable_operator_db_access}" != "true" ] && [ "${TF_VAR_enable_operator_db_access}" != "false" ]; then
            echo "ENABLE_OPERATOR_DB_ACCESS must be true or false."
            exit 1
          fi

          if [ "${TF_VAR_enable_operator_db_access}" = "true" ]; then
            if [ -z "${OPERATOR_CIDR:-}" ]; then
              echo "TF_VAR_operator_cidr is required when operator database access is enabled."
              exit 1
            fi

            if [[ ! "${OPERATOR_CIDR}" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}/32$ ]]; then
              echo "TF_VAR_operator_cidr must be an IPv4 /32."
              exit 1
            fi
          fi

          {
            printf 'TF_VAR_aws_region=%s\n' "${AWS_REGION}"
            printf 'TF_VAR_project_name=%s\n' "${PROJECT_NAME}"
            printf 'TF_VAR_environment=%s\n' "${ENVIRONMENT}"
          } >> "${GITHUB_ENV}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform state bucket
        shell: bash
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket already exists."
          else
            echo "Creating Terraform state bucket."

            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Terraform init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="region=${AWS_REGION}" -backend-config="key=oficina-infra-db/${ENVIRONMENT}/terraform.tfstate" -backend-config="use_lockfile=true"

      - name: Terraform plan
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${OPERATOR_CIDR:-}" ]; then
            export TF_VAR_operator_cidr="${OPERATOR_CIDR}"
          fi

          if ! terraform plan -out=tfplan >/tmp/terraform-plan.log 2>&1; then
            echo "Terraform plan failed."
            exit 1
          fi

          echo "Terraform plan completed."

      - name: Terraform apply
        run: |
          set -euo pipefail

          if ! terraform apply -auto-approve tfplan >/tmp/terraform-apply.log 2>&1; then
            echo "Terraform apply failed."
            exit 1
          fi

          echo "Terraform apply completed."

      - name: Validate RDS instance
        shell: bash
        run: |
          set -euo pipefail

          db_instance_identifier="$(printf '%s-sqlserver' "${TF_VAR_project_name:-oficina}" | tr '[:upper:]' '[:lower:]')"

          rds_info="$(aws rds describe-db-instances \
            --db-instance-identifier "${db_instance_identifier}" \
            --region "${AWS_REGION}" \
            --query 'DBInstances[0].[DBInstanceStatus,Engine,PubliclyAccessible]' \
            --output text 2>/dev/null || true)"
          read -r status engine publicly_accessible <<<"${rds_info}"

          if [ -z "${status:-}" ] || [ "${status:-}" = "None" ]; then
            echo "RDS instance validation failed."
            exit 1
          fi

          if [ "${status}" != "available" ]; then
            echo "RDS instance is not available."
            exit 1
          fi

          if [ "${engine}" != "sqlserver-ex" ]; then
            echo "RDS instance configuration is not valid."
            exit 1
          fi

          expected_public_access="${TF_VAR_enable_operator_db_access}"
          if [ "${publicly_accessible}" != "${expected_public_access^}" ]; then
            echo "RDS public access setting is not valid."
            exit 1
          fi

          echo "RDS instance validated."
