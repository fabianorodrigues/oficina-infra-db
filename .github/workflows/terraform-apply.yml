name: Terraform Apply

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets['AWS_ACCESS_KEY_ID'] }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets['AWS_SECRET_ACCESS_KEY'] }}
      AWS_SESSION_TOKEN: ${{ secrets['AWS_SESSION_TOKEN'] }}
      AWS_REGION: ${{ secrets['AWS_REGION'] }}
      TF_STATE_BUCKET: ${{ secrets['TF_STATE_BUCKET'] }}
      TF_VAR_db_username: ${{ secrets['TF_VAR_db_username'] }}
      TF_VAR_db_password: ${{ secrets['TF_VAR_db_password'] }}
      TF_VAR_operator_cidr: ${{ secrets['TF_VAR_operator_cidr'] }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_REGION
            TF_STATE_BUCKET
            TF_VAR_db_username
            TF_VAR_db_password
            TF_VAR_operator_cidr
          )

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "${var_name} secret is required."
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          printf 'TF_VAR_aws_region=%s\n' "${AWS_REGION}" >> "${GITHUB_ENV}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform state bucket
        shell: bash
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket already exists: ${TF_STATE_BUCKET}"
          else
            echo "Creating Terraform state bucket: ${TF_STATE_BUCKET}"

            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Terraform init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="region=${AWS_REGION}"

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        run: terraform apply -auto-approve

      - name: Show Terraform outputs
        shell: bash
        run: |
          set -euo pipefail

          echo "db_address=$(terraform output -raw db_address)"
          echo "db_port=$(terraform output -raw db_port)"
          echo "db_name=$(terraform output -raw db_name)"
          echo "lambda_subnet_ids=$(terraform output -json lambda_subnet_ids)"
          echo "lambda_security_group_ids=$(terraform output -json lambda_security_group_ids)"

          if terraform output db_connection_string_without_password >/dev/null 2>&1; then
            echo "db_connection_string_without_password=$(terraform output -raw db_connection_string_without_password)"
          fi

      - name: Validate RDS instance
        shell: bash
        run: |
          set -euo pipefail

          db_instance_identifier="$(terraform output -raw db_instance_identifier)"

          read -r status engine endpoint port publicly_accessible < <(
            aws rds describe-db-instances \
              --db-instance-identifier "${db_instance_identifier}" \
              --region "${AWS_REGION}" \
              --query 'DBInstances[0].[DBInstanceStatus,Engine,Endpoint.Address,Endpoint.Port,PubliclyAccessible]' \
              --output text
          )

          echo "RDS identifier: ${db_instance_identifier}"
          echo "RDS status: ${status}"
          echo "RDS engine: ${engine}"
          echo "RDS endpoint: ${endpoint}"
          echo "RDS port: ${port}"
          echo "RDS publicly accessible: ${publicly_accessible}"

          if [ "${status}" != "available" ]; then
            echo "RDS instance is not available."
            exit 1
          fi
